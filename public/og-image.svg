    <circle cx="80" cy="80" r="75" fill="white" opacity="0.95"/>
    <path d="M92.5 40V52.5C104.854 52.5 115 62.646 115 75C115 87.354 104.854 97.5 92.5 97.5H72.5C66.9772 97.5 62.5 101.977 62.5 107.5C62.5 113.023 66.9772 117.5 72.5 117.5H92.5C104.854 117.5 115 127.646 115 140V152.5" stroke="#10B981" stroke-width="8" stroke-linecap="round"/>
    <path d="M72.5 52.5C60.146 52.5 50 62.646 50 75C50 87.354 60.146 97.5 72.5 97.5" stroke="#10B981" stroke-width="8" stroke-linecap="round"/>
